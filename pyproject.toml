[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "direct-cli"
version = "0.2.1"
description = "Command-line interface for Yandex Direct API"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [
    {name = "axisrow"}
]
keywords = ["yandex", "direct", "cli", "api", "advertising"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
]
dependencies = [
    "tapi-yandex-direct>=2021.5.29",
    "click>=8.0.0",
    "python-dotenv>=0.19.0",
    "tabulate>=0.8.0",
    "colorama>=0.4.0",
    "tqdm>=4.60.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=6.0",
    "pytest-cov>=2.0",
    "black>=22.0",
    "flake8>=4.0",
]

[project.scripts]
direct = "direct_cli.cli:cli"
direct-cli = "direct_cli.cli:cli"

[project.urls]
Homepage = "https://github.com/axisrow/direct-cli"
Repository = "https://github.com/axisrow/direct-cli"

[tool.setuptools.packages.find]
where = ["."]
include = ["direct_cli*"]

[tool.black]
line-length = 88
target-version = ['py39']
include = '\.pyi?$'
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
markers = [
    "integration: marks tests as integration tests requiring a real API token (deselect with '-m \"not integration\"')",
]
